services:
  dev:
    build:
      context: .
      target: builder
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - HOSTNAME=0.0.0.0
    command: npm run dev

  runner:
    build:
      context: .
      target: runner
    ports:
      - '8080:80'
    profiles:
      - prod
